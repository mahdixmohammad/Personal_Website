<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <link rel="stylesheet" href="indexstyle.css">
</head>
<body>
    <nav class="nav-bar">
        <label id="logo">mahdixmohammad</label>
        <ul>
            <li id="first"><a href="#">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">TRADES</a></li>
            <li><a href="#">PROJECTS</a></li>
            <li><a href="#contact_me">CONTACT</a></li>
        </ul>
        <div class="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </nav>
    <script>
        hamburger = document.querySelector(".hamburger");
        hamburger.onclick = function(){
            navBar = document.querySelector(".nav-bar");
            navBar.classList.toggle("active");
        }
    </script>
    <div class="intro">
        <h1>Mahdi<span>Mohammad</span></h1>
        <p>Showcasing my portfolio and experiences.</p>
        <div class="links">
            <a href="#contact_me" id="contact_btn">Contact Me</a>
            <a href="https://github.com/mahdixmohammad" target="_blank">
                <img src="https://icones.pro/wp-content/uploads/2021/06/icone-github-violet.png" alt="GitHub" title="GitHub" id="github">
            </a>
            <a href="https://www.linkedin.com/in/mahdixmohammad/" target="_blank">
                <img src="https://itcnet.gr/wp-content/uploads/2020/09/Linkedin-logo-on-transparent-Background-PNG--1024x1024.png" alt="LinkedIn" title="LinkedIn" id="linkedin">
            </a>
        </div>
    </div>
    <div class="summary">
        
    </div>
    <div class="row" id="contact_me">
        <div class="col-md-6 col-md-offset-3" id="form_container">
            <h2>Contact Me</h2>
            <form role="form" method="post" id="reused_form">
                <div class="row">
                    <div class="col-sm-12 form-group">
                        <label for="message">
                            Message:</label>
                        <textarea class="form-control" type="textarea" id="message" name="message" maxlength="6000" rows="7"></textarea>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6 form-group">
                        <label for="name">
                            Your Name:</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="col-sm-6 form-group">
                        <label for="email">
                            Email:</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 form-group">
                        <button type="submit" class="btn btn-lg btn-default pull-right" >Send →</button>
                    </div>
                </div>
            </form>
            <div id="success_message" style="width:100%; height:100%; display:none; ">
                <h3>Posted your message successfully!</h3>
            </div>
            <div id="error_message"
                 style="width:100%; height:100%; display:none; ">
                <h3>Error</h3>
                Sorry there was an error sending your form.
            </div>
        </div>
    </div>
</body>
</html>
